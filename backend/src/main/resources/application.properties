server.port=8080
server.address=0.0.0.0
spring.application.name=senas133-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/mediacion_directa
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# validate = Spring NO crea tablas, solo revisa que existan y coincidan con el script manual.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# Simulación de integración con CENCO/sistema externo ya existente.
app.integration.external-url=http://localhost:9090/sistema-externo/emergencias

# Frontend web/móvil local para prototipo.
app.cors.allowed-origins=http://localhost:4200,http://localhost:5173,http://localhost:3000,http://localhost:8100

# Contingencia SMS: el backend prepara el texto; la app móvil lo abre en Mensajes.
app.sms.enabled=true
app.sms.center-phone=+56900000000
