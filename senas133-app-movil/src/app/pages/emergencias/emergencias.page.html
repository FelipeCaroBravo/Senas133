<ion-content [fullscreen]="true">
  <main class="page-shell emergencias-shell">

    <div class="phone-status-bar">
      <span class="status-time">{{ horaActual }}</span>

      <div class="status-right">
        <button
          class="status-wifi"
          type="button"
          [class.offline]="sinInternet"
          (click)="alternarInternet()"
          aria-label="Cambiar estado de conexión">
          <i
            class="bi"
            [class.bi-wifi]="!sinInternet"
            [class.bi-wifi-off]="sinInternet">
          </i>
        </button>

        <span class="battery-icon">
          <i class="bi bi-battery-full"></i>
        </span>
      </div>
    </div>

    <header class="emergency-header">
      <div class="status-pill">
        <span></span>
        <strong>Conectado a Central</strong>
      </div>

      <div class="header-actions">
        <button
          class="round-icon-btn"
          type="button"
          (click)="perfil()"
          aria-label="Perfil">
          <ion-icon name="person-circle-outline"></ion-icon>
        </button>

        <button
          class="round-icon-btn play-help-btn"
          type="button"
          (click)="ayudaAbierta = true"
          aria-label="Ver ayuda en lengua de señas chilena">
          <ion-icon name="play-circle-outline"></ion-icon>
        </button>
      </div>
    </header>

    <section class="emergency-content">

      <button
        class="panic-card"
        type="button"
        (click)="enviarRojaInmediata()"
        [disabled]="enviandoRoja">

        <div class="siren-circle">
          <img
            src="assets/img/icono-peligro.png"
            alt="Peligro">
        </div>

        <h1>
          {{ enviandoRoja ? 'Enviando...' : 'Peligro' }}
        </h1>

        <h2>Ayuda urgente</h2>

        <div class="panic-label">
          Pedir ayuda ahora
        </div>

        <div class="panic-grid">
          <div class="panic-item">
            <img
              src="assets/img/icono-peligro-grid.png"
              alt="Peligro">
            <strong>PELIGRO</strong>
          </div>

          <div class="panic-item">
            <img
              src="assets/img/icono-robo-casa.png"
              alt="Robo en casa">
            <strong>ROBO / CASA</strong>
          </div>

          <div class="panic-item">
            <img
              src="assets/img/icono-arma.png"
              alt="Arma">
            <strong>ARMA</strong>
          </div>

          <div class="panic-item">
            <img
              src="assets/img/icono-golpe.png"
              alt="Golpe">
            <strong>GOLPE</strong>
          </div>
        </div>
      </button>

      <button
        class="support-card orange-card"
        type="button"
        (click)="abrirCategoria('ASISTENCIA_VIAL')">

        <div class="support-icon">
          <img
            src="assets/img/icono-apoyo-calle.png"
            alt="Apoyo / Calle">
        </div>

        <div class="support-text">
          <strong>Apoyo en la calle</strong>
          <span>Choque, pelea o problema</span>
        </div>

        <div class="support-arrow">›</div>
      </button>

      <button
        class="support-card blue-card"
        type="button"
        (click)="abrirCategoria('SOSPECHA_PREVENCION')">

        <div class="support-icon">
          <img
            src="assets/img/icono-veo-algo-raro.png"
            alt="Veo algo raro">
        </div>

        <div class="support-text">
          <strong>Veo algo raro</strong>
          <span>Personas o autos extraños</span>
        </div>

        <div class="support-arrow">›</div>
      </button>

    </section>

    <button
      class="floating-lsch-btn"
      type="button"
      (click)="irCamuflaje()"
      aria-label="Modo camuflaje">
      <img src="assets/img/logo-senas133.png" alt="">
    </button>

    <section class="lsch-app-overlay" *ngIf="ayudaAbierta">
      <button
        class="lsch-close-btn"
        type="button"
        (click)="ayudaAbierta = false"
        aria-label="Cerrar ayuda">
        ×
      </button>

      <div class="lsch-video-card">
        <div class="lsch-video-box">
          <img
            src="assets/img/video-lsch.png"
            alt="Video explicativo en lengua de señas chilena">
        </div>

        <div class="lsch-info">
          <h2>Ayuda en LSCh</h2>
          <p>Este video explica cómo usar esta pantalla.</p>

          <button
            class="lsch-understood-btn"
            type="button"
            (click)="ayudaAbierta = false">
            Entendido
          </button>
        </div>
      </div>
    </section>

  </main>

  
</ion-content>
