<ion-content [fullscreen]="true">
  <main class="page-shell pin-shell">
    <header class="header-simple">
      <button class="back-btn" type="button" (click)="volver()">‹</button>
      <h1>Acceso con PIN</h1>

  
    </header>

    <section class="pin-content">
      <div class="pin-video-card">
        <img
          src="assets/img/video-pin-lsch.png"
          alt="Video explicativo en lengua de señas chilena para ingresar PIN"
          class="pin-video-img">
      </div>

      <h2 class="pin-title">Ingresa tu PIN</h2>

      <div class="pin-dots" aria-label="PIN ingresado">
        <span [class.active]="pin.length > 0"></span>
        <span [class.active]="pin.length > 1"></span>
        <span [class.active]="pin.length > 2"></span>
        <span [class.active]="pin.length > 3"></span>
      </div>

      <section class="keypad">
        <button
          *ngFor="let numero of numeros"
          type="button"
          (click)="add(numero)"
          [disabled]="validando">
          {{ numero }}
        </button>

        <button
          class="keypad-empty"
          type="button"
          disabled>
        </button>

        <button
          type="button"
          (click)="add('0')"
          [disabled]="validando">
          0
        </button>

        <button
          class="keypad-action delete-key"
          type="button"
          (click)="borrar()"
          [disabled]="validando">
          ⌫
        </button>
      </section>

      <button
        class="recover-btn"
        type="button"
        (click)="recuperar()"
        [disabled]="validando">
        Recuperar o cambiar PIN
      </button>
    </section>
  </main>
</ion-content>
