<ion-content [fullscreen]="true">
  <main class="page-shell pin-shell">
    <button class="back-btn pin-back" type="button" (click)="volver()">‹</button>

    <section class="pin-content">
      <h1>Ingresa tu PIN</h1>

      <div class="pin-dots">
        <span [class.active]="pin.length > 0"></span>
        <span [class.active]="pin.length > 1"></span>
        <span [class.active]="pin.length > 2"></span>
        <span [class.active]="pin.length > 3"></span>
      </div>

      <div class="keypad">
        <button *ngFor="let n of numeros" type="button" (click)="add(n)">{{ n }}</button>
        <span></span>
        <button type="button" (click)="add('0')">0</button>
        <button class="delete" type="button" (click)="borrar()">⌫</button>
      </div>
    </section>

    <button class="recover" type="button" (click)="recuperar()">¿Olvidaste tu PIN? Recuperar con Clave Única</button>
  </main>
</ion-content>
