<ion-content [fullscreen]="true">
  <main class="page-shell camuflaje-shell">
    <header class="game-header">
      <button class="game-icon-btn" type="button" (click)="volver()">
        ‹
      </button>

      <div class="score">
        SCORE: 14,320
      </div>

      <button class="game-icon-btn" type="button" aria-label="Ayuda visual">
        🎥
      </button>
    </header>

    <section
      class="board-area"
      (dragover)="permitirSoltar($event)"
      (drop)="colocarPieza()">

      <div class="game-board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell purple"></div>
        <div class="cell purple"></div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell purple"></div>
        <div class="cell purple"></div>
        <div class="cell purple"></div>
        <div class="cell"></div>

        <div class="cell magenta"></div>
        <div class="cell magenta"></div>
        <div class="cell purple"></div>
        <div class="cell purple"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell magenta"></div>
        <div class="cell magenta"></div>
        <div class="cell purple"></div>
        <div class="cell purple"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell magenta"></div>
        <div class="cell magenta"></div>
        <div class="cell purple"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell magenta"></div>
        <div class="cell magenta"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
      </div>
    </section>

    <section class="piece-area" *ngIf="!piezaColocada">
      <div
        class="puzzle-piece"
        draggable="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <p>Drag piece to board</p>
    </section>

    <section class="question-strip" *ngIf="piezaColocada && preguntas[indice] as pregunta">
      <p>{{ pregunta.textoCamuflado }}</p>

      <div class="question-actions">
        <button
          type="button"
          (click)="responder(true)"
          [disabled]="enviando">
          SÍ
        </button>

        <button
          type="button"
          (click)="responder(false)"
          [disabled]="enviando">
          NO
        </button>
      </div>
    </section>

    <section class="sending-panel" *ngIf="enviando">
      <div class="loader">⏳</div>
      <p>Calculando puntaje...</p>
    </section>
  </main>
</ion-content>
