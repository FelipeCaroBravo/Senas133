<ion-content [fullscreen]="true">
  <main class="page-shell active-shell" [ngClass]="claseColor">
    <header class="active-header">
      <button class="back-btn active-back" type="button" (click)="volver()">‹</button>

      <button
        class="help-floating"
        type="button"
        aria-label="Ver ayuda en lengua de señas"
        (click)="ayudaAbierta = true">
        <span class="play-symbol">▶</span>
      </button>
    </header>

    <section class="active-top">
      <div class="siren">
        <img src="assets/img/icono-peligro.png" alt="Alerta activada">
      </div>

      <h1>Alerta Activada</h1>
      <p>{{ subtitulo }}</p>
    </section>

    <ng-container *ngIf="emergencia as e; else cargando">
      <section class="status-card">
        <div class="status-row">
          <span class="ok">✅</span>

          <div>
            <strong>Carabineros ya sabe</strong>
            <small>
              {{
                centralNotificada
                  ? 'Tu alerta fue recibida. Espera ayuda.'
                  : 'Tu alerta fue enviada. Espera ayuda.'
              }}
            </small>
          </div>
        </div>

        <div class="status-row">
          <span class="gps" aria-label="Ubicación enviada">📍</span>

          <div>
            <strong>Carabineros ve tu ubicación</strong>
            <small>Ubicación enviada correctamente.</small>
          </div>
        </div>
      </section>
    </ng-container>

    <ng-template #cargando>
      <section class="status-card">
        <div class="status-row">
          <span class="ok">⏳</span>

          <div>
            <strong>Cargando alerta</strong>
            <small>Obteniendo información desde la central.</small>
          </div>
        </div>
      </section>
    </ng-template>

    <button
      class="cancel-alert-btn"
      type="button"
      (click)="cancelarAlerta()">
      Cancelar alerta
    </button>

    <button class="interpreter-btn" type="button" (click)="conectarInterprete()">
      <span>🎥</span>

      <div>
        <strong>Conectar con Intérprete</strong>
        <small>Videollamada segura</small>
      </div>
    </button>
    <section class="alert-video-overlay" *ngIf="ayudaAbierta">
      <div class="alert-video-card">
        <button
          class="alert-video-close"
          type="button"
          aria-label="Cerrar video"
          (click)="ayudaAbierta = false">
          ×
        </button>

        <img
          src="assets/img/video-alerta.png"
          alt="Video de ayuda en lengua de señas">
      </div>
    </section>
  </main>
</ion-content>
