services:
  mysql:
    image: mysql:8.0
    container_name: senas133-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mediacion_directa
      MYSQL_USER: senas_user
      MYSQL_PASSWORD: senas_pass
      MYSQL_ROOT_PASSWORD: rootpass
      TZ: America/Santiago
    ports:
      - "3306:3306"
    volumes:
      - senas133_mysql_data:/var/lib/mysql
      - ./Scripts/schema-data.sql:/docker-entrypoint-initdb.d/01-schema-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: senas133-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/mediacion_directa?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
      DB_USERNAME: senas_user
      DB_PASSWORD: senas_pass
      SMS_CENTER_PHONE: +56900000000
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:8100,http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"

volumes:
  senas133_mysql_data:
