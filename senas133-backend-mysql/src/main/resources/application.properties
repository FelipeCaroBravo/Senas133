server.port=${SERVER_PORT:8080}
server.address=0.0.0.0
spring.application.name=senas133-backend

# MySQL local o Docker.
# Local por defecto: localhost:3306. En docker-compose se reemplaza por DB_URL=jdbc:mysql://mysql:3306/...
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mediacion_directa?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago}
spring.datasource.username=${DB_USERNAME:senas_user}
spring.datasource.password=${DB_PASSWORD:senas_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# El prototipo usa BD creada manualmente con Scripts/schema-data.sql.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.sql.init.mode=never

# Integración simulada con CENCO / sistema externo ya existente.
app.integration.external-url=${EXTERNAL_SYSTEM_URL:http://localhost:9090/sistema-externo/emergencias}

# Frontends permitidos: app móvil Ionic y CENCO simulado.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173,http://localhost:3000,http://localhost:8100,http://127.0.0.1:4200,http://127.0.0.1:8100}

# Contingencia SMS: el backend prepara el número/texto; el teléfono abre Mensajes.
app.sms.enabled=${SMS_ENABLED:true}
app.sms.center-phone=${SMS_CENTER_PHONE:+56900000000}
